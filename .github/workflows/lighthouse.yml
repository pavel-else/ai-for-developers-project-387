name: Lighthouse Audit

on:
  schedule:
    - cron: "0 3 * * *" # Ежедневно 03:00 UTC (06:00 МСК)
  workflow_dispatch:
    inputs:
      url:
        description: "URL для аудита"
        required: false
        type: string
        default: "https://ai-for-developers-project-386-h7vt.onrender.com/"
      analyze:
        description: "Запустить анализ агентом OpenCode"
        required: false
        type: boolean
        default: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Determine URL
        id: url
        run: |
          URL="${{ inputs.url || 'https://ai-for-developers-project-386-h7vt.onrender.com/' }}"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse
        run: |
          npx lighthouse ${{ steps.url.outputs.url }} \
            --output=html --output=json \
            --output-path=./lighthouse-report \
            --chrome-flags="--headless=new"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: ./lighthouse-report.*
          retention-days: 30

      - name: Analyze with OpenCode
        id: analyze
        if: ${{ github.event.inputs.analyze != 'false' }}
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: |
            Read ./lighthouse-report.json.
            Compare FCP, LCP, CLS, INP, TBT, SI with docs/performance-baseline.md.
            ALWAYS create a single issue (regardless of degradation) titled
            "Lighthouse Report — <YYYY-MM-DD>" (use today's date) containing:
            1. A markdown table with columns: Metric | Current | Baseline | Delta %.
               Fill in all six metrics (FCP, LCP, CLS, INP, TBT, SI).
            2. A line listing metrics that degraded by more than 10% relative
               to baseline, or "No degradation detected" if none.
            3. A link to the lighthouse-report artifact (HTML) for the team
               to open in a browser in the morning.
            4. If any metric degraded by more than 10%, add a "Recommendations"
               section identifying likely culprits in recent commits and
               suggesting specific fixes.
            Apply the label "lighthouse-report" if it exists in the repository.
            If that label does not exist, create the issue without a label
            (do not fail).
            Create exactly one issue per run.

      - name: Close report issue
        if: ${{ github.event.inputs.analyze != 'false' }}
        uses: actions/github-script@v7
        with:
          script: |
            const since = new Date(Date.now() - 15 * 60 * 1000).toISOString();
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator: 'github-actions[bot]',
              since,
              per_page: 100,
            });
            for (const issue of issues.data) {
              if (issue.labels.some(l => l.name === 'lighthouse-report') ||
                  /Lighthouse Report —/.test(issue.title)) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
                core.info(`Closed issue #${issue.number}: ${issue.title}`);
              }
            }
